<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Minigame</title>
</head>

<body>
    <h1 id="result-h1">choose one</h1>
    <div id="choices">
        <div class="cards" id="choice-one" data-choice="paper"> <img src="./images/1325806-200.png" alt="paper"></div>
        <div class="cards" id="choice-two" data-choice="rock"><img src="./images/711504-200.png" alt="rock"></div>
        <div class="cards" id="choice-three" data-choice="scissors"><img
                src="./images/scissors-glyph-icon-free-vector.jpg" alt="scissors"></div>
    </div>

    <div id="result">
        <div id="score-txt">
            <p id="computer-p">Computer score: 0</p>
            <p id="player-p">Your score: 0</p>
        </div>
        <div id="box-2">
            <button id="button-reset">RESET</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
